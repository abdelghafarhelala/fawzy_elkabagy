name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --base-href=/fawzy_elkabagy/

      - name: Add .nojekyll (disable Jekyll README fallback)
        run: touch dist/restro-menu/browser/.nojekyll

      - name: Verify build output
        run: |
          test -f dist/restro-menu/browser/index.html
          grep -q 'app-root' dist/restro-menu/browser/index.html
          grep -q 'base href="/fawzy_elkabagy/"' dist/restro-menu/browser/index.html
          ls -la dist/restro-menu/browser

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/restro-menu/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
