<div class="admin-page admin-login-wrap">
  <div class="admin-login-card">
    <div class="admin-login-top">
      <div>
        <p class="admin-eyebrow">{{ 'admin.login.eyebrow' | translate }}</p>
        <h1>{{ 'admin.login.title' | translate }}</h1>
        <p class="admin-muted">{{ 'admin.login.subtitle' | translate }}</p>
      </div>
      <button
        type="button"
        class="admin-lang-toggle"
        (click)="toggleLanguage()"
        [attr.aria-label]="'admin.langAria' | translate">
        <span>{{ nextLanguageLabel() }}</span>
      </button>
    </div>

    <form class="admin-form-grid" style="margin-top: 1.25rem" (ngSubmit)="onSubmit()">
      <label>
        {{ 'admin.login.email' | translate }}
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          autocomplete="username"
          required />
      </label>
      <label>
        {{ 'admin.login.password' | translate }}
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          autocomplete="current-password"
          required />
      </label>

      @if (errorMessage()) {
        <p class="admin-error">{{ errorMessage() }}</p>
      }

      <div class="admin-actions">
        <button class="admin-btn" type="submit" [disabled]="isSubmitting()">
          {{
            isSubmitting()
              ? ('admin.login.signingIn' | translate)
              : ('admin.login.signIn' | translate)
          }}
        </button>
        <a routerLink="/" class="admin-btn secondary">
          {{ 'admin.login.backToSite' | translate }}
        </a>
      </div>
    </form>
  </div>
</div>
