<div class="admin-page admin-login-wrap">
  <div class="admin-login-card">
    <p class="admin-eyebrow">Fawzy Elkababgy</p>
    <h1>Admin Login</h1>
    <p class="admin-muted">Sign in to manage the restaurant dashboard.</p>

    <form class="admin-form-grid" style="margin-top: 1.25rem" (ngSubmit)="onSubmit()">
      <label>
        Email
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          autocomplete="username"
          required />
      </label>
      <label>
        Password
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          autocomplete="current-password"
          required />
      </label>

      @if (errorMessage()) {
        <p class="admin-error">{{ errorMessage() }}</p>
      }

      <div class="admin-actions">
        <button class="admin-btn" type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Signing in…' : 'Sign in' }}
        </button>
        <a routerLink="/" class="admin-btn secondary">Back to site</a>
      </div>
    </form>
  </div>
</div>
