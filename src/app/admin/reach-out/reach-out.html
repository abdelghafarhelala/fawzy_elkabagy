<div class="admin-header">
  <div>
    <p class="admin-eyebrow">{{ 'admin.common.eyebrowContent' | translate }}</p>
    <h1>{{ 'admin.reachOut.title' | translate }}</h1>
  </div>
</div>

@if (errorMessage()) {
  <p class="admin-error">{{ errorMessage() }}</p>
}
@if (successMessage()) {
  <p class="admin-success">{{ successMessage() }}</p>
}

<div class="admin-card">
  @if (isLoading()) {
    <p class="admin-muted">{{ 'admin.common.loading' | translate }}</p>
  } @else {
    <form class="admin-form-grid" (ngSubmit)="save()">
      <label>
        {{ 'admin.reachOut.locationEn' | translate }}
        <input name="location_en" [(ngModel)]="form.location_en" required />
      </label>
      <label>
        {{ 'admin.reachOut.locationAr' | translate }}
        <input
          name="location_ar"
          [(ngModel)]="form.location_ar"
          required
          dir="rtl" />
      </label>
      <label>
        {{ 'admin.reachOut.phone' | translate }}
        <input name="phone" [(ngModel)]="form.phone" required />
      </label>
      <label>
        {{ 'admin.reachOut.hoursEn' | translate }}
        <input name="hours_en" [(ngModel)]="form.hours_en" required />
      </label>
      <label>
        {{ 'admin.reachOut.hoursAr' | translate }}
        <input
          name="hours_ar"
          [(ngModel)]="form.hours_ar"
          required
          dir="rtl" />
      </label>
      <div class="admin-actions">
        <button class="admin-btn" type="submit" [disabled]="isSaving()">
          {{
            isSaving()
              ? ('admin.common.saving' | translate)
              : ('admin.common.save' | translate)
          }}
        </button>
      </div>
    </form>
  }
</div>
