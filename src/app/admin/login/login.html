<div class="admin-page admin-login-wrap">
  <button
    type="button"
    class="admin-lang-toggle admin-login-lang"
    (click)="toggleLanguage()"
    [attr.aria-label]="'admin.langAria' | translate">
    <span>{{ nextLanguageLabel() }}</span>
  </button>

  <div class="admin-login-card">
    <div class="admin-login-brand">
      <img
        class="admin-login-logo"
        src="images/Logo.png"
        alt="Fawzy Elkababgy"
        width="280"
        height="64" />
      <h1>{{ 'admin.login.title' | translate }}</h1>
      <p class="admin-muted">{{ 'admin.login.subtitle' | translate }}</p>
    </div>

    <form class="admin-form-grid" (ngSubmit)="onSubmit()">
      <label>
        {{ 'admin.login.email' | translate }}
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          autocomplete="username"
          required />
      </label>
      <label>
        {{ 'admin.login.password' | translate }}
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          autocomplete="current-password"
          required />
      </label>

      @if (errorMessage()) {
        <p class="admin-error">{{ errorMessage() }}</p>
      }

      <div class="admin-actions admin-login-actions">
        <button class="admin-btn" type="submit" [disabled]="isSubmitting()">
          {{
            isSubmitting()
              ? ('admin.login.signingIn' | translate)
              : ('admin.login.signIn' | translate)
          }}
        </button>
        <a routerLink="/" class="admin-btn secondary">
          {{ 'admin.login.backToSite' | translate }}
        </a>
      </div>
    </form>
  </div>
</div>
